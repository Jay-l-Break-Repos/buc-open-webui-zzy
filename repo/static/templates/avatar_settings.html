<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Avatar – Open WebUI</title>
  <style>
    /* ── Reset & base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1a1a2e;
      --surface:   #16213e;
      --card:      #0f3460;
      --accent:    #e94560;
      --accent-h:  #c73652;
      --text:      #e0e0e0;
      --text-muted:#9ca3af;
      --border:    #2d3748;
      --success:   #10b981;
      --error:     #ef4444;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      padding: 40px 36px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .card-header svg { flex-shrink: 0; }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .card-subtitle {
      font-size: .85rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Avatar preview ─────────────────────────────────────────────────── */
    .avatar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .avatar-ring {
      position: relative;
      width: 120px;
      height: 120px;
    }

    #avatar-preview {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--accent);
      background: var(--card);
      display: block;
      transition: opacity .2s;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      cursor: pointer;
      transition: opacity .2s;
    }

    .avatar-ring:hover .avatar-overlay { opacity: 1; }

    .avatar-overlay svg { color: #fff; }

    .avatar-hint {
      font-size: .8rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── File input area ────────────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      margin-bottom: 20px;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(233,69,96,.06);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone-icon { margin-bottom: 10px; color: var(--text-muted); }

    .drop-zone-label {
      font-size: .9rem;
      color: var(--text-muted);
    }

    .drop-zone-label strong { color: var(--accent); }

    .drop-zone-formats {
      font-size: .75rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ── Selected file info ─────────────────────────────────────────────── */
    #file-info {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: .85rem;
    }

    #file-info.visible { display: flex; }

    #file-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #file-size { color: var(--text-muted); flex-shrink: 0; }

    .file-clear {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px;
      display: flex;
      align-items: center;
      transition: color .15s;
    }

    .file-clear:hover { color: var(--error); }

    /* ── Messages ───────────────────────────────────────────────────────── */
    .message {
      display: none;
      align-items: flex-start;
      gap: 10px;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: .875rem;
      margin-bottom: 20px;
    }

    .message.visible { display: flex; }

    .message-error {
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.35);
      color: #fca5a5;
    }

    .message-success {
      background: rgba(16,185,129,.12);
      border: 1px solid rgba(16,185,129,.35);
      color: #6ee7b7;
    }

    .message svg { flex-shrink: 0; margin-top: 1px; }

    /* ── Upload button ──────────────────────────────────────────────────── */
    #upload-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .2s, transform .1s;
    }

    #upload-btn:hover:not(:disabled) { background: var(--accent-h); }
    #upload-btn:active:not(:disabled) { transform: scale(.98); }
    #upload-btn:disabled { opacity: .55; cursor: not-allowed; }

    /* ── Spinner ────────────────────────────────────────────────────────── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Progress bar ───────────────────────────────────────────────────── */
    #progress-wrap {
      display: none;
      margin-bottom: 16px;
    }

    #progress-wrap.visible { display: block; }

    #progress-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .2s;
    }

    /* ── Token input ────────────────────────────────────────────────────── */
    .token-section {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .token-label {
      font-size: .8rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: block;
    }

    .token-input-wrap {
      display: flex;
      gap: 8px;
    }

    #token-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .85rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s;
    }

    #token-input:focus { border-color: var(--accent); }

    #token-input::placeholder { color: var(--text-muted); }

    .token-save-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .8rem;
      padding: 9px 14px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      white-space: nowrap;
    }

    .token-save-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

<div class="card" role="main">

  <!-- Header -->
  <div class="card-header">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none"
         stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <div>
      <div class="card-title">Profile Avatar</div>
      <div class="card-subtitle">Upload a new profile picture</div>
    </div>
  </div>

  <!-- Avatar preview -->
  <div class="avatar-wrap">
    <div class="avatar-ring" id="avatar-ring-btn" role="button" tabindex="0"
         aria-label="Click to choose an image" title="Click to choose an image">
      <img id="avatar-preview" src="/static/logo.png" alt="Current avatar" />
      <div class="avatar-overlay" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
    </div>
    <p class="avatar-hint">Click the image or use the area below to choose a file</p>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="drop-zone" role="button" aria-label="File drop zone">
    <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp"
           aria-label="Choose avatar image" />
    <div class="drop-zone-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <div class="drop-zone-label">
      <strong>Click to browse</strong> or drag &amp; drop
    </div>
    <div class="drop-zone-formats">PNG · JPEG · WebP &nbsp;·&nbsp; Max 5 MB</div>
  </div>

  <!-- Selected file info -->
  <div id="file-info" role="status" aria-live="polite">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <span id="file-name"></span>
    <span id="file-size"></span>
    <button class="file-clear" id="clear-btn" aria-label="Remove selected file" title="Remove">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Error message -->
  <div class="message message-error" id="error-msg" role="alert" aria-live="assertive">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="error-text"></span>
  </div>

  <!-- Success message -->
  <div class="message message-success" id="success-msg" role="status" aria-live="polite">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <span id="success-text"></span>
  </div>

  <!-- Progress bar -->
  <div id="progress-wrap" aria-hidden="true">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
  </div>

  <!-- Upload button -->
  <button id="upload-btn" disabled aria-label="Upload avatar">
    <div class="spinner" id="spinner" aria-hidden="true"></div>
    <svg id="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/>
      <line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <span id="btn-label">Upload Avatar</span>
  </button>

  <!-- Token section -->
  <div class="token-section">
    <label class="token-label" for="token-input">
      Bearer Token (paste your Open WebUI session token)
    </label>
    <div class="token-input-wrap">
      <input type="password" id="token-input" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9…"
             autocomplete="off" spellcheck="false" />
      <button class="token-save-btn" id="token-save-btn" type="button">Save</button>
    </div>
  </div>

</div><!-- /.card -->

<script>
(function () {
  'use strict';

  /* ── Constants ─────────────────────────────────────────────────────────── */
  const ALLOWED_TYPES  = ['image/png', 'image/jpeg', 'image/webp'];
  const MAX_BYTES      = 5 * 1024 * 1024; // 5 MB
  const API_ENDPOINT   = '/api/v1/users/user/avatar';
  const TOKEN_KEY      = 'owui_avatar_token';

  /* ── DOM refs ──────────────────────────────────────────────────────────── */
  const fileInput     = document.getElementById('file-input');
  const dropZone      = document.getElementById('drop-zone');
  const avatarPreview = document.getElementById('avatar-preview');
  const avatarRingBtn = document.getElementById('avatar-ring-btn');
  const fileInfo      = document.getElementById('file-info');
  const fileName      = document.getElementById('file-name');
  const fileSize      = document.getElementById('file-size');
  const clearBtn      = document.getElementById('clear-btn');
  const errorMsg      = document.getElementById('error-msg');
  const errorText     = document.getElementById('error-text');
  const successMsg    = document.getElementById('success-msg');
  const successText   = document.getElementById('success-text');
  const progressWrap  = document.getElementById('progress-wrap');
  const progressBar   = document.getElementById('progress-bar');
  const uploadBtn     = document.getElementById('upload-btn');
  const spinner       = document.getElementById('spinner');
  const btnIcon       = document.getElementById('btn-icon');
  const btnLabel      = document.getElementById('btn-label');
  const tokenInput    = document.getElementById('token-input');
  const tokenSaveBtn  = document.getElementById('token-save-btn');

  /* ── State ─────────────────────────────────────────────────────────────── */
  let selectedFile = null;

  /* ── Token persistence ─────────────────────────────────────────────────── */
  tokenInput.value = localStorage.getItem(TOKEN_KEY) || '';

  tokenSaveBtn.addEventListener('click', () => {
    localStorage.setItem(TOKEN_KEY, tokenInput.value.trim());
    tokenSaveBtn.textContent = '✓ Saved';
    setTimeout(() => { tokenSaveBtn.textContent = 'Save'; }, 1500);
  });

  /* ── Helpers ───────────────────────────────────────────────────────────── */
  function formatBytes(bytes) {
    if (bytes < 1024)       return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  }

  function showError(msg) {
    errorText.textContent = msg;
    errorMsg.classList.add('visible');
    successMsg.classList.remove('visible');
  }

  function showSuccess(msg) {
    successText.textContent = msg;
    successMsg.classList.add('visible');
    errorMsg.classList.remove('visible');
  }

  function clearMessages() {
    errorMsg.classList.remove('visible');
    successMsg.classList.remove('visible');
  }

  function setLoading(loading) {
    uploadBtn.disabled = loading || !selectedFile;
    spinner.style.display  = loading ? 'block' : 'none';
    btnIcon.style.display  = loading ? 'none'  : 'block';
    btnLabel.textContent   = loading ? 'Uploading…' : 'Upload Avatar';
    progressWrap.classList.toggle('visible', loading);
    if (!loading) progressBar.style.width = '0%';
  }

  /* ── File selection ────────────────────────────────────────────────────── */
  function handleFile(file) {
    clearMessages();

    if (!file) return;

    /* Format check */
    if (!ALLOWED_TYPES.includes(file.type)) {
      showError(
        'Unsupported format. Please choose a PNG, JPEG, or WebP image.'
      );
      resetSelection();
      return;
    }

    /* Size check */
    if (file.size > MAX_BYTES) {
      showError(
        `File is too large (${formatBytes(file.size)}). Maximum allowed size is 5 MB.`
      );
      resetSelection();
      return;
    }

    selectedFile = file;

    /* Show file info row */
    fileName.textContent = file.name;
    fileSize.textContent = formatBytes(file.size);
    fileInfo.classList.add('visible');

    /* Live preview */
    const reader = new FileReader();
    reader.onload = (e) => { avatarPreview.src = e.target.result; };
    reader.readAsDataURL(file);

    uploadBtn.disabled = false;
  }

  function resetSelection() {
    selectedFile = null;
    fileInput.value = '';
    fileInfo.classList.remove('visible');
    uploadBtn.disabled = true;
  }

  /* ── File input events ─────────────────────────────────────────────────── */
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
  });

  /* Clicking the avatar ring also opens the file picker */
  avatarRingBtn.addEventListener('click', () => fileInput.click());
  avatarRingBtn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
  });

  /* ── Drag & drop ───────────────────────────────────────────────────────── */
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  ['dragleave', 'dragend'].forEach((evt) => {
    dropZone.addEventListener(evt, () => dropZone.classList.remove('drag-over'));
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  /* ── Clear button ──────────────────────────────────────────────────────── */
  clearBtn.addEventListener('click', () => {
    resetSelection();
    avatarPreview.src = '/static/logo.png';
    clearMessages();
  });

  /* ── Upload ────────────────────────────────────────────────────────────── */
  uploadBtn.addEventListener('click', uploadAvatar);

  async function uploadAvatar() {
    if (!selectedFile) return;

    const token = tokenInput.value.trim() || localStorage.getItem(TOKEN_KEY) || '';
    if (!token) {
      showError('Please enter your Bearer token before uploading.');
      return;
    }

    clearMessages();
    setLoading(true);

    const formData = new FormData();
    formData.append('file', selectedFile, selectedFile.name);

    try {
      /* Use XMLHttpRequest for upload progress */
      const result = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener('progress', (e) => {
          if (e.lengthComputable) {
            progressBar.style.width = Math.round((e.loaded / e.total) * 100) + '%';
          }
        });

        xhr.addEventListener('load', () => {
          try {
            const data = JSON.parse(xhr.responseText);
            if (xhr.status >= 200 && xhr.status < 300) {
              resolve(data);
            } else {
              reject(new Error(data.detail || `HTTP ${xhr.status}`));
            }
          } catch {
            reject(new Error(`HTTP ${xhr.status}: unexpected response`));
          }
        });

        xhr.addEventListener('error', () => reject(new Error('Network error – please try again.')));
        xhr.addEventListener('abort', () => reject(new Error('Upload was cancelled.')));

        xhr.open('POST', API_ENDPOINT);
        xhr.setRequestHeader('Authorization', `Bearer ${token}`);
        xhr.send(formData);
      });

      /* Success */
      progressBar.style.width = '100%';

      /* Update preview with the persisted avatar URL */
      if (result.profile_image_url) {
        /* Bust cache with a timestamp query param */
        avatarPreview.src = result.profile_image_url + '?t=' + Date.now();
      }

      showSuccess('Avatar updated successfully! 🎉');
      resetSelection();

    } catch (err) {
      showError(err.message || 'Upload failed. Please try again.');
    } finally {
      setLoading(false);
    }
  }

})();
</script>
</body>
</html>
